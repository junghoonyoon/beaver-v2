<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.58" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#edf5ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="82%" cy="22%" r="64%">
      <stop offset="0" stop-color="#d8ebff" stop-opacity="0.95"/>
      <stop offset="0.44" stop-color="#edf6ff" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
    <filter id="buttonShadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0071e3" flood-opacity="0.18"/>
    </filter>
    <style>
      .font { font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Helvetica Neue", Arial, sans-serif; }
      .ink { fill:#1d1d1f; }
      .body { fill:#5f6368; }
      .muted { fill:#8b9098; }
      .blue { fill:#0071e3; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <g class="font">
    <g transform="translate(72 70)">
      <rect width="56" height="40" rx="14" fill="#0071e3" filter="url(#buttonShadow)"/>
      <text x="28" y="29" fill="#ffffff" font-size="28" font-weight="900" text-anchor="middle">?</text>
      <text x="76" y="29" class="ink" font-size="28" font-weight="760">지금사도될까요?</text>
    </g>

    <text x="72" y="184" class="blue" font-size="34" font-weight="820">주식 유튜브 의견 요약</text>
    <text x="72" y="264" class="ink" font-size="72" font-weight="900">사기 전에,</text>
    <text x="72" y="344" class="ink" font-size="72" font-weight="900">유튜버 의견부터</text>
    <text x="72" y="424" class="ink" font-size="72" font-weight="900">빠르게</text>

    <text x="72" y="474" class="body" font-size="28" font-weight="640">긴 영상을 다 볼 필요 없이 종목별 의견을 한눈에</text>

    <g transform="translate(72 532)">
      <rect width="258" height="42" rx="21" fill="#eef6ff"/>
      <text x="129" y="28" fill="#0071e3" font-size="19" font-weight="760" text-anchor="middle">최근 2주 주식 유튜브 기준</text>

      <rect x="274" width="244" height="42" rx="21" fill="#f1f3f5"/>
      <text x="396" y="28" fill="#60646c" font-size="19" font-weight="760" text-anchor="middle">긍정·신중·부정 의견 요약</text>
    </g>

    <g transform="translate(738 105)" filter="url(#softShadow)">
      <rect width="388" height="398" rx="34" fill="#ffffff" stroke="#e5eaf1"/>

      <g transform="translate(34 34)">
        <rect width="320" height="58" rx="18" fill="#ffffff" stroke="#dce3ec"/>
        <text x="24" y="37" class="ink" font-size="22" font-weight="720">삼성전자</text>
        <rect x="235" y="11" width="72" height="36" rx="18" fill="#0071e3"/>
        <text x="271" y="35" fill="#ffffff" font-size="17" font-weight="820" text-anchor="middle">요약</text>
      </g>

      <g transform="translate(34 124)">
        <text x="0" y="0" class="muted" font-size="17" font-weight="700">최근 주식 유튜브 의견</text>

        <g transform="translate(0 30)">
          <text x="0" y="28" class="ink" font-size="22" font-weight="780">SK하이닉스</text>
          <rect x="234" y="4" width="78" height="34" rx="17" fill="#e8f6ed"/>
          <text x="273" y="27" fill="#168a46" font-size="17" font-weight="820" text-anchor="middle">긍정</text>
          <line x1="0" y1="58" x2="320" y2="58" stroke="#edf0f4"/>
        </g>

        <g transform="translate(0 98)">
          <text x="0" y="28" class="ink" font-size="22" font-weight="780">삼성전자</text>
          <rect x="234" y="4" width="78" height="34" rx="17" fill="#fbf4df"/>
          <text x="273" y="27" fill="#8a6915" font-size="17" font-weight="820" text-anchor="middle">신중</text>
          <line x1="0" y1="58" x2="320" y2="58" stroke="#edf0f4"/>
        </g>

        <g transform="translate(0 166)">
          <text x="0" y="28" class="ink" font-size="22" font-weight="780">엔비디아</text>
          <rect x="234" y="4" width="78" height="34" rx="17" fill="#f0f1f3"/>
          <text x="273" y="27" fill="#60646c" font-size="17" font-weight="820" text-anchor="middle">언급</text>
        </g>
      </g>

      <g transform="translate(34 340)">
        <circle cx="18" cy="18" r="18" fill="#ff0033"/>
        <path d="M14 10 L14 26 L27 18 Z" fill="#ffffff"/>
        <text x="52" y="25" class="body" font-size="18" font-weight="700">긴 영상 핵심만 빠르게 확인</text>
      </g>
    </g>
  </g>
</svg>
