<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>이 종목 어때?</title>
  <style>
    @font-face {
      font-family:"GmarketSansBold";
      src:url("https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff") format("woff");
      font-weight:700;
      font-style:normal;
      font-display:swap;
    }

    :root {
      --ink:#171717; --body:#5f6368; --muted:#8b9098; --line:#e2e4e8;
      --canvas:#f7f8fa; --card:#fff; --blue:#1267e5; --blue-wash:#eaf2ff;
      --pos:#168a46; --pos-bg:#e8f6ed; --neu:#8a6915; --neu-bg:#fbf4df;
      --neg:#c7352d; --neg-bg:#fdecea; --mention:#60646c; --mention-bg:#f0f1f3;
      --shadow:0 12px 30px rgba(20,28,45,.08);
    }
    * { box-sizing:border-box }
    ::selection { background:rgba(18,103,229,.14); color:var(--ink) }
    body {
      margin:0; min-height:100vh; color:var(--ink);
      font-family:Inter,-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;
      background:#fff;
    }
    button,input { font:inherit }
    .page { width:min(760px,calc(100% - 28px)); margin:0 auto; padding:70px 0 80px }
    .brand {
      display:inline-flex; align-items:center; gap:9px; border:0; padding:0;
      background:transparent; color:var(--blue); font-size:20px; font-weight:850;
      letter-spacing:-.1px; cursor:pointer;
    }
    .brand-mark {
      position:relative; display:grid; place-items:center; width:36px; height:25px;
      border-radius:10px / 8px; background:var(--blue); color:#fff; font-size:19px; font-weight:900;
      line-height:1; box-shadow:0 8px 18px rgba(18,103,229,.22);
    }
    .brand-mark::before {
      content:""; position:absolute; inset:1px 2px 2px; border-radius:9px / 7px;
      background:linear-gradient(180deg,rgba(255,255,255,.1),rgba(255,255,255,0));
      pointer-events:none;
    }
    .brand-mark span { position:relative; z-index:1; transform:translateY(-1px) }
    .brand-name { white-space:nowrap; font-family:"GmarketSansBold","Apple SD Gothic Neo",sans-serif; transform:translateY(1px) }
    .brand-name strong { font-weight:700 }
    .hero-copy.hide { display:none }
    h1 { margin:24px 0 18px; font-size:clamp(28px,5.4vw,40px); line-height:1.2; letter-spacing:.2px }
    .lead { margin:0; color:var(--body); font-size:16px; line-height:1.65 }
    .search {
      position:sticky; top:12px; z-index:30; margin-top:30px; display:flex; gap:10px; padding:8px;
      border:1px solid var(--line); border-radius:16px; background:var(--card); box-shadow:var(--shadow);
    }
    .search input {
      width:100%; min-width:0; border:0; outline:0; padding:12px 14px;
      color:var(--ink); background:transparent; font-size:17px;
    }
    .search button {
      flex:0 0 auto; border:0; border-radius:11px; padding:0 22px;
      background:var(--blue); color:#fff; font-weight:750; cursor:pointer;
    }
    .search button:disabled { opacity:.55; cursor:wait }
    .suggestions {
      display:none; position:absolute; z-index:20; left:0; right:0; top:calc(100% + 8px);
      overflow:auto; max-height:430px; border:1px solid #dfe3ea; border-radius:14px;
      background:#fff; box-shadow:0 16px 40px rgba(20,28,45,.1); padding:10px 0;
    }
    .suggestions.show { display:flex; flex-direction:column; gap:8px }
    .suggestion {
      appearance:none; -webkit-appearance:none;
      display:grid; grid-template-columns:92px minmax(0,1fr) 78px; align-items:center; gap:18px;
      width:100%; border:0; border-radius:0; padding:13px 20px;
      background:#fff !important; color:var(--ink); text-align:left; cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }
    .suggestion:hover,.suggestion.active { background:#f7f9fc !important }
    .suggestion-code { color:#70757d; font-size:16px; font-weight:500; line-height:1.3; letter-spacing:.02em; font-variant-numeric:tabular-nums }
    .suggestion-name { min-width:0; color:#14161a; font-size:16px; font-weight:700; line-height:1.3; word-break:keep-all }
    .suggestion-name .match { color:var(--blue); font-weight:800 }
    .suggestion-market { color:#70757d; font-size:15px; font-weight:600; line-height:1.3; text-align:right; white-space:nowrap }
    .market-panel { margin-top:36px }
    .market-tabs {
      display:flex; width:100%; gap:3px; padding:3px;
      border:1px solid #eceff3; border-radius:999px; background:#f5f6f8;
    }
    .market-tab {
      appearance:none; flex:1 1 0; min-width:0; border:0; border-radius:999px; padding:9px 15px;
      background:transparent; color:#8b9098; font-size:15px; font-weight:700; cursor:pointer;
    }
    .market-tab.active { background:#fff; color:var(--ink); box-shadow:0 1px 3px rgba(20,28,45,.08) }
    .rank-caption { margin:13px 0 12px; color:var(--muted); font-size:12px; font-weight:700 }
    .rank-list {
      display:grid; gap:0; overflow:hidden; border:0; border-radius:12px;
      background:#fff;
    }
    .rank-item {
      appearance:none; display:grid; grid-template-columns:24px minmax(0,1fr) auto; align-items:center; gap:12px;
      width:100%; border:0; border-bottom:1px solid #edf0f3; padding:11px 0;
      background:#fff; color:var(--ink); text-align:left; cursor:pointer;
    }
    .rank-item:last-child { border-bottom:0 }
    .rank-item:hover { background:#f7f9fc }
    .rank-no { color:#7aa7f2; font-size:14px; font-weight:750; text-align:right; font-variant-numeric:tabular-nums }
    .rank-body { display:grid; gap:3px; min-width:0 }
    .rank-title { display:flex; align-items:baseline; gap:6px; min-width:0; flex-wrap:wrap }
    .rank-name { display:block; min-width:0; color:#30343b; font-size:15px; font-weight:650; line-height:1.35 }
    .rank-code { display:none; color:#9aa0a9; font-size:12px; font-weight:600; line-height:1.2; font-variant-numeric:tabular-nums; white-space:nowrap }
    .rank-change { color:#667085; font-size:12px; font-weight:650; line-height:1; font-variant-numeric:tabular-nums; white-space:nowrap }
    .rank-change.up { color:var(--pos) }
    .rank-change.down { color:var(--neg) }
    .rank-change.flat { color:#667085 }
    .rank-meta {
      display:block; color:#667085; font-size:12px; font-weight:500; line-height:1.2;
      text-align:right; white-space:nowrap;
    }
    .rank-opinion { color:#667085; font-size:12px; font-weight:500 }
    .rank-opinion strong { color:#30343b; font-weight:800 }
    .rank-market { display:none }
    .market-panel.hide { display:none }
    .status { display:none; margin-top:10px; color:var(--muted); font-size:13px }
    .status.show { display:block }
    .loading {
      display:none; margin-top:34px; padding:28px; text-align:center;
      border:1px solid var(--line); border-radius:18px; background:var(--card);
    }
    .loading.show { display:block }
    .spinner {
      width:28px; height:28px; margin:0 auto 12px; border:3px solid #dce8fb;
      border-top-color:var(--blue); border-radius:50%; animation:spin .8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg) } }
    .result { margin-top:38px }
    .result:empty { display:none }
    .summary { padding:6px 0 0 }
    .summary h2 { margin:0; font-size:26px; letter-spacing:-.025em; line-height:1.22 }
    .summary-meta { margin-top:12px; color:var(--body); font-size:14px; line-height:1.6 }
    .summary-period { color:var(--blue); font-weight:800 }
    .counts { display:flex; flex-wrap:wrap; gap:9px; margin-top:18px }
    .count {
      appearance:none; border:0; border-radius:999px; padding:6px 10px;
      font-size:13px; font-weight:750; cursor:pointer;
    }
    .count:hover { filter:brightness(.98) }
    .count.pos,.badge.pos { color:var(--pos); background:var(--pos-bg) }
    .count.neu,.badge.neu { color:var(--neu); background:var(--neu-bg) }
    .count.neg,.badge.neg { color:var(--neg); background:var(--neg-bg) }
    .count.mention,.badge.mention { color:var(--mention); background:var(--mention-bg) }
    .cards { display:grid; gap:16px; margin-top:24px }
    .card { padding:22px; border:1px solid var(--line); border-radius:16px; background:var(--card) }
    .card-head { display:flex; align-items:center; gap:10px }
    .opinion-block { margin-top:20px; min-width:0 }
    .channel {
      display:inline-flex; color:#6f7783; font-size:14px; font-weight:500; text-decoration:underline;
      text-decoration-thickness:1px; text-underline-offset:3px;
    }
    .channel:hover { color:var(--blue) }
    .video-meta { color:#30343b; font-size:15px; font-weight:500; line-height:1.35 }
    .badge { margin-left:auto; border-radius:999px; padding:6px 10px; font-size:12px; font-weight:800 }
    .field-label { margin-top:18px; color:var(--muted); font-size:11px; font-weight:800 }
    .opinion { margin:4px 0 0; font-size:18px; font-weight:700; line-height:1.62; word-break:keep-all }
    .evidence-label { margin-top:15px }
    .evidence { margin:6px 0 0; color:#4b5058; font-size:15px; line-height:1.72; word-break:keep-all }
    .evidence-source {
      display:inline-flex; align-items:center; margin-left:6px; color:#7a8491;
      font-size:13px; font-weight:400; line-height:1; text-decoration:underline;
      text-decoration-thickness:1px; text-underline-offset:3px; white-space:nowrap;
    }
    .evidence-source:hover { color:var(--blue) }
    .source-actions { display:flex; justify-content:flex-end; margin-top:18px }
    .source-link {
      display:inline-flex; align-items:center; justify-content:center; min-height:30px;
      border:0; border-radius:0; padding:0; background:transparent; color:var(--blue);
      font-size:13px; font-weight:800; line-height:1; text-decoration:none; white-space:nowrap;
    }
    .source-link::after { content:"↗"; margin-left:5px; font-size:12px; line-height:1 }
    .source-link:hover { color:#185abc; text-decoration:underline; text-underline-offset:3px }
    .empty,.error {
      padding:24px; border:1px solid var(--line); border-radius:16px; background:var(--card);
      color:var(--body); line-height:1.6;
    }
    .error { color:var(--neg); border-color:#f2c8c5 }
    .foot { margin-top:28px; color:var(--muted); font-size:12px; line-height:1.6 }
    @media (max-width:560px) {
      .page { padding-top:40px }
      .search { top:10px; gap:6px; padding:6px }
      .search input { padding:10px 10px; font-size:16px }
      .search button { min-height:46px; padding:0 14px; font-size:15px; white-space:nowrap }
      .market-panel { margin-top:30px }
      .market-tab { font-size:14px; padding:8px 13px }
      .rank-item { grid-template-columns:22px minmax(0,1fr) auto; gap:10px; padding:11px 0 }
      .rank-name { font-size:15px }
      .suggestion { grid-template-columns:72px minmax(0,1fr) 64px; gap:10px; padding:12px 14px }
      .suggestion-code,.suggestion-name,.suggestion-market { font-size:14px }
    }
  </style>
</head>
<body>
  <main class="page">
    <button class="brand" type="button" id="homeButton" aria-label="첫 화면으로 이동">
      <span class="brand-mark" aria-hidden="true"><span>?</span></span>
      <span class="brand-name">이 종목 <strong>어때?</strong></span>
    </button>
    <div class="hero-copy" id="heroCopy">
      <h1>주식·투자<br>자주 보는 유튜버 최신 의견을 한눈에</h1>
      <p class="lead">최근 2주 업로드 영상에서 종목·ETF·섹터·테마를 실제로 언급한 유튜버를 찾고,<br>긍정·신중·부정 의견과 근거를 한눈에 정리해드려요.</p>
    </div>

    <form class="search" id="form">
      <input id="query" autocomplete="off" placeholder="예: 삼성전자, 엔비디아, 반도체 ETF" aria-label="종목명">
      <button id="submit" type="submit">의견 찾기</button>
      <div class="suggestions" id="suggestions" role="listbox" aria-label="종목 추천"></div>
    </form>
    <section class="market-panel" id="marketPanel" aria-label="인기주식">
      <div class="market-tabs" role="tablist" aria-label="시장 선택">
        <button class="market-tab active" type="button" data-market="kr" role="tab" aria-selected="true">국내주식</button>
        <button class="market-tab" type="button" data-market="us" role="tab" aria-selected="false">미국주식</button>
      </div>
      <div class="rank-caption" id="rankCaption">인기주식 TOP 10 · 최근 14일 유튜브 언급 기준 · 실시간 주가 흐름</div>
      <div class="rank-list" id="rankList"></div>
    </section>
    <div class="status" id="status">검색 인덱스를 확인하는 중이에요…</div>

    <section class="loading" id="loading">

    </section>
    <section class="result" id="result"></section>

    <p class="foot">유튜버의 공개 영상 의견을 요약한 참고 자료이며 투자 권유가 아닙니다. 의견의 정확한 맥락은 원본 영상을 확인해 주세요.</p>
  </main>

    const dateText = value => {

      const period = d.getHours() < 12 ? "오전" : "오후";
      const hour = d.getHours() % 12 || 12;
      const minute = String(d.getMinutes()).padStart(2, "0");
      return `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일 ${period} ${hour}:${minute} 업로드`;
    };
    const relativeDateText = value => {
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return "";
      const diffMs = Date.now() - d.getTime();
      if (diffMs < 0) return dateText(value);
      const minute = 60 * 1000;
      const hour = 60 * minute;
      const day = 24 * hour;
      if (diffMs < hour) return `${Math.max(1, Math.floor(diffMs / minute))}분 전`;
      if (diffMs < day) return `${Math.floor(diffMs / hour)}시간 전`;
      return `${Math.floor(diffMs / day)}일 전`;
    };

      if (hour) return `${hour}시간 ${Math.floor((sec % 3600) / 60)}분`;
      return min ? `${min}분 ${rest}초` : `${rest}초`;

    const compact = value => String(value ?? "").replace(/[^0-9A-Za-z가-힣ㄱ-ㅎㅏ-ㅣ]/g, "").toLowerCase();
    const initials = value => Array.from(String(value ?? "")).map(ch => {
      const code = ch.charCodeAt(0);
      if (code >= 0xac00 && code <= 0xd7a3) return choseong[Math.floor((code - 0xac00) / 588)];
      if (choseong.includes(ch)) return ch;
      return /[0-9a-z]/i.test(ch) ? ch.toLowerCase() : "";

    const isInitialQuery = value => {

    const scoreTerm = (q, term, exact, prefix, contains) => {
      const key = compact(term);

      if (key === q) return exact;
      if (key.startsWith(q)) return prefix;
      if (key.includes(q)) return contains;
      return null;
    };
    function scoreStock(row, query) {
      const q = compact(query);
      const candidates = [];
      const push = (score, type, matched) => { if (score !== null) candidates.push({ score, type, matched }); };
      push(scoreTerm(q, row.name, 0, 10, 70), "종목명", row.name);
      if (isInitialQuery(q)) push(scoreTerm(q, initials(row.name), 20, 20, 85), "초성", initials(row.name));
      push(scoreTerm(q, row.code, 1, 30, 95), "종목코드", row.code);
      push(scoreTerm(q, row.english, 2, 40, 90), "영문명", row.english);
      row.aliases.forEach(alias => push(scoreTerm(q, alias, 3, 50, 100), "별칭", alias));
      row.keywords.forEach(keyword => push(scoreTerm(q, keyword, 4, 60, 110), "키워드", keyword));
      return candidates.sort((a, b) => a.score - b.score)[0] || null;
    }

        await pollSearch(data.jobId, token);
      } catch (error) {
        const message = error.message === "Failed to fetch" ? serverRequiredMessage : error.message;
        analytics.send("search_result", { query, success:false, error:message });
        result.innerHTML = `<div class="error">${esc(message)}</div>`;
      } finally {
        if (token === activeSearchToken) {
          activeSearchDone = true;
          submit.disabled = false; loading.classList.remove("show");
        }
      }
    }

    async function pollSearch(jobId, token) {
      while (token === activeSearchToken) {
        await new Promise(resolve => setTimeout(resolve, 700));
        const response = await fetch(`/api/search/progress?id=${encodeURIComponent(jobId)}`);
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "검색 진행상황을 읽지 못했어요.");
        if (token !== activeSearchToken) return;
        loadingTitle.textContent = data.done ? "분석이 끝났어요" : "유튜버 의견을 분석 중이에요";
        loadingText.textContent = data.currentStatus || "분석 결과를 정리하고 있어요.";
        render(data);
        trackSearchSnapshot(data);
        if (data.done) return;
      }
    }
    form.addEventListener("submit", e => {
      e.preventDefault();
      if (activeSuggestion >= 0) {
        chooseSuggestion(activeSuggestion);
        return;
      }
      search(input.value);
    });
    input.addEventListener("input", () => {
      clearTimeout(suggestTimer);
      suggestTimer = setTimeout(() => loadSuggestions(input.value), 120);
    });
    input.addEventListener("keydown", e => {
      if (!suggestions.length) return;
      if (e.key === "ArrowDown") {
        e.preventDefault();
        setActiveSuggestion((activeSuggestion + 1) % suggestions.length);
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        setActiveSuggestion((activeSuggestion - 1 + suggestions.length) % suggestions.length);
      } else if (e.key === "Escape") {
        hideSuggestions();
      }
    });
    suggestionsEl.addEventListener("mousedown", e => {
      const button = e.target.closest(".suggestion");
      if (!button) return;
      e.preventDefault();
      chooseSuggestion(Number(button.dataset.index));
    });
    document.addEventListener("click", e => {
      if (!form.contains(e.target)) hideSuggestions();
    });
    homeButton.addEventListener("click", showHome);
    marketPanel.addEventListener("click", e => {
      const tab = e.target.closest(".market-tab");
      if (tab) {
        marketPanel.querySelectorAll(".market-tab").forEach(item => {
          const active = item === tab;
          item.classList.toggle("active", active);
          item.setAttribute("aria-selected", String(active));
        });
        renderRanking(tab.dataset.market);
        return;
      }
      const item = e.target.closest(".rank-item");
      if (item) search(item.dataset.query);
    });
    result.addEventListener("click", e => {
      const link = e.target.closest("a.source-link,a.evidence-source,a.channel");
      if (link) {
        analytics.send("video_click", {
          query:activeSearchQuery,
          url:link.href,
          label:link.textContent.trim(),
        });
        return;
      }
      const count = e.target.closest(".count[data-stance]");
      if (!count) return;
      const card = [...result.querySelectorAll(".card[data-stance]")]
        .find(item => item.dataset.stance === count.dataset.stance);
      if (card) card.scrollIntoView({ behavior:"smooth", block:"start" });
    });
    analytics.send("page_view");
    analytics.send("session_start");
    renderRanking("kr");
    loadRanking();
    loadStatus();
  </script>
</body>
</html>
