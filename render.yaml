services:
  - type: web
    name: beaver-stock-search
    env: python
    plan: free
    autoDeploy: true
    buildCommand: cd beaver-v2/pipeline && pip install -r requirements.txt
    startCommand: cd beaver-v2/pipeline && python search_server.py
    envVars:
      - key: ANALYSIS_PROVIDER
        value: openrouter
      - key: OPENROUTER_MODEL
        value: google/gemini-2.5-flash
      - key: STARTUP_SEARCH_REFRESH_ENABLED
        value: "1"
      - key: SEARCH_INDEX_REFRESH_HOURS
        value: "3"
      - key: SEARCH_MAX_VIDEOS_PER_CHANNEL
        value: "5"
      - key: SUPABASE_STORAGE_BUCKET
        value: beaver-cache
      - key: STARTUP_STOCK_REFRESH_ENABLED
        value: "1"
      - key: YOUTUBE_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SUPADATA_API_KEY
        sync: false
      - key: KRX_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
